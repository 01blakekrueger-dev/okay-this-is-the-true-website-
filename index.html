<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>WILLY V10 - COLAB STRENGTH</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.css">
    
    <style>
        :root { --neon: #00ff41; --bg: #050505; --panel: #111; }
        body { background: var(--bg); color: var(--neon); font-family: 'Courier New', monospace; text-align: center; margin: 0; padding: 20px; }
        h2 { letter-spacing: 2px; margin-bottom: 5px; }
        
        .container { display: flex; flex-direction: column; align-items: center; gap: 15px; }
        #board { width: 420px; border: 4px solid #222; box-shadow: 0 0 20px rgba(0,255,65,0.15); }
        
        .hud { background: var(--panel); border: 1px solid #333; padding: 15px; width: 420px; box-sizing: border-box; text-align: left; }
        #status-text { font-size: 18px; font-weight: bold; margin-bottom: 10px; color: #fff; }
        
        #move-log { background: #000; padding: 10px; height: 120px; overflow-y: auto; font-size: 13px; border: 1px solid #222; color: #aaa; }
        .log-entry { margin-bottom: 4px; border-bottom: 1px dashed #222; padding-bottom: 2px; }
        .willy-move { color: var(--neon); }
        
        .loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .spinner { margin-top: 20px; font-size: 20px; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0; } }
        
        button { background: #000; color: var(--neon); border: 1px solid var(--neon); padding: 10px 15px; cursor: pointer; font-family: inherit; font-weight: bold; width: 100%; margin-top: 10px; }
        button:hover { background: var(--neon); color: #000; }
    </style>
</head>
<body>

<div id="loader" class="loading-overlay">
    <h1 style="color:#fff;">DOWNLOADING WILLY CORE</h1>
    <div id="load-msg" style="color:var(--neon);">Initializing Pyodide Environment...</div>
    <div class="spinner">_</div>
</div>

<div class="container">
    <h2>WILLY V10 : GRANDMASTER</h2>
    
    <div id="board"></div>
    
    <div class="hud">
        <div id="status-text">SYSTEM OFFLINE</div>
        <div id="move-log"></div>
        <button onclick="resetGame()">RESET MATCH</button>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/pyodide/v0.25.0/full/pyodide.js"></script>

<script>
    let pyodide;
    let board = null;
    let game = new Chess(); // The JavaScript Referee
    let moveCount = 1;

    async function bootEngine() {
        try {
            // 1. Load Python
            pyodide = await loadPyodide();
            document.getElementById('load-msg').innerText = "Installing python-chess (Please wait...)";
            await pyodide.loadPackage("micropip");
            const micropip = pyodide.pyimport("micropip");
            await micropip.install("python-chess");

            // 2. Inject Stateless Willy (Depth 3 Alpha-Beta)
            document.getElementById('load-msg').innerText = "Compiling Minimax Logic...";
            await pyodide.runPythonAsync(`
import chess
import math
import random

class WillyEngine:
    def __init__(self):
        self.values = {
            chess.PAWN: 100, chess.KNIGHT: 320, chess.BISHOP: 330,
            chess.ROOK: 500, chess.QUEEN: 900, chess.KING: 20000
        }

    def evaluate(self, b):
        if b.is_checkmate():
            return 99999 if b.turn == chess.WHITE else -99999
        if b.is_draw():
            return 0
            
        score = 0
        for sq, p in b.piece_map().items():
            val = self.values.get(p.piece_type, 0)
            score += val if p.color == chess.BLACK else -val
        return score

    def minimax(self, b, depth, alpha, beta, maximizing):
        if depth == 0 or b.is_game_over():
            return self.evaluate(b)

        if maximizing:
            max_eval = -math.inf
            for move in b.legal_moves:
                b.push(move)
                ev = self.minimax(b, depth - 1, alpha, beta, False)
                b.pop()
                max_eval = max(max_eval, ev)
                alpha = max(alpha, ev)
                if beta <= alpha:
                    break
            return max_eval
        else:
            min_eval = math.inf
            for move in b.legal_moves:
                b.push(move)
                ev = self.minimax(b, depth - 1, alpha, beta, True)
                b.pop()
                min_eval = min(min_eval, ev)
                beta = min(beta, ev)
                if beta <= alpha:
                    break
            return min_eval

    def get_best_move(self, fen):
        b = chess.Board(fen)
        best_move = None
        max_eval = -math.inf
        
        # Colab Strength: Depth 3 Lookahead
        for move in b.legal_moves:
            b.push(move)
            ev = self.minimax(b, 2, -math.inf, math.inf, False)
            b.pop()
            
            if ev > max_eval:
                max_eval = ev
                best_move = move
                
        # Fallback if something weird happens
        if best_move is None:
            best_move = random.choice(list(b.legal_moves))
            
        return best_move.uci()

willy = WillyEngine()
            `);

            // 3. Start UI
            document.getElementById('loader').style.display = 'none';
            document.getElementById('status-text').innerText = "YOUR TURN (WHITE)";
            
            var config = {
                draggable: true,
                position: 'start',
                pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png',
                onDragStart: onDragStart,
                onDrop: onDrop,
                onSnapEnd: onSnapEnd
            };
            board = Chessboard('board', config);
            
        } catch (error) {
            document.getElementById('load-msg').innerText = "CRITICAL ERROR. CHECK CONSOLE.";
            document.getElementById('load-msg').style.color = "red";
            console.error(error);
        }
    }

    // Prevents picking up pieces if game over or if it's Willy's turn
    function onDragStart(source, piece, position, orientation) {
        if (game.game_over()) return false;
        if (piece.search(/^b/) !== -1) return false; // Prevent moving black pieces
    }

    // Handles the piece drop
    function onDrop(source, target) {
        // 1. JS Referee checks if move is legal
        var move = game.move({
            from: source,
            to: target,
            promotion: 'q' // Always promote to queen for simplicity
        });

        // Illegal move? Snap it back immediately.
        if (move === null) return 'snapback';

        // 2. Legal move! Update UI
        logMove("YOU", move.san);
        updateStatus();

        // 3. Trigger Willy (Using setTimeout so the browser draws your piece first)
        if (!game.game_over()) {
            document.getElementById('status-text').innerText = "WILLY IS THINKING...";
            document.getElementById('status-text').style.color = "yellow";
            
            setTimeout(makeWillyMove, 250);
        }
    }

    // Updates board to handle castling, en passant, promotions visually
    function onSnapEnd() {
        board.position(game.fen());
    }

    // Asks Python for the move
    async function makeWillyMove() {
        try {
            let currentFen = game.fen();
            
            // Call the stateless Python brain
            let willyUciMove = await pyodide.runPythonAsync(`willy.get_best_move("${currentFen}")`);
            
            // Clean up the string just in case
            willyUciMove = willyUciMove.trim();
            
            // Parse the UCI string so chess.js can read it safely
            let fromSq = willyUciMove.substring(0, 2);
            let toSq = willyUciMove.substring(2, 4);
            let promo = willyUciMove.length === 5 ? willyUciMove.charAt(4) : 'q';

            // Apply Willy's move to the JS Referee using the exact object format
            let move = game.move({
                from: fromSq,
                to: toSq,
                promotion: promo
            });

            if (move === null) {
                throw new Error("Referee rejected Python move: " + willyUciMove);
            }
            
            // Update UI
            board.position(game.fen());
            logMove("WILLY", move.san);
            updateStatus();
            
        } catch (e) {
            console.error("Willy Engine Error:", e);
            document.getElementById('status-text').innerText = "ENGINE CRASHED";
        }
    }

    function updateStatus() {
        let statusEl = document.getElementById('status-text');
        
        if (game.in_checkmate()) {
            statusEl.innerText = "CHECKMATE! GAME OVER.";
            statusEl.style.color = "red";
        } else if (game.in_draw() || game.in_stalemate() || game.in_threefold_repetition()) {
            statusEl.innerText = "DRAW!";
            statusEl.style.color = "orange";
        } else {
            statusEl.innerText = "YOUR TURN";
            statusEl.style.color = "var(--neon)";
            
            if (game.in_check()) {
                statusEl.innerText += " (CHECK)";
                statusEl.style.color = "red";
            }
        }
    }

    function logMove(player, moveSan) {
        let logEl = document.getElementById('move-log');
        let colorClass = player === "WILLY" ? "willy-move" : "";
        let turnStr = player === "YOU" ? moveCount + ". " : "   ";
        
        let html = `<div class="log-entry ${colorClass}">${turnStr}<b>${player}</b> played ${moveSan}</div>`;
        logEl.innerHTML += html;
        logEl.scrollTop = logEl.scrollHeight;
        
        if (player === "WILLY") moveCount++;
    }

    function resetGame() {
        game.reset();
        board.start();
        moveCount = 1;
        document.getElementById('move-log').innerHTML = "";
        updateStatus();
    }

    // Start everything
    bootEngine();
</script>
</body>
</html>
