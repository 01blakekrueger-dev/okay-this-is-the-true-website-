<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WILLY V8.7 - ENGINE CORE</title>
    
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    
    <style>
        body { 
            background: #050505; 
            color: #00ff41; 
            font-family: 'Courier New', monospace; 
            text-align: center; 
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .wrapper { 
            background: #111;
            padding: 30px;
            border-radius: 15px;
            border: 2px solid #222;
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.2);
        }
        #board { 
            width: 400px; 
            margin: 20px auto; 
            border: 5px solid #333; 
        }
        #console { 
            background: #000; 
            color: #0f0; 
            padding: 10px; 
            width: 380px; 
            margin: 10px auto; 
            border: 1px solid #333; 
            height: 40px; 
            line-height: 40px; 
            font-weight: bold; 
            text-transform: uppercase;
        }
        .stats { font-size: 1.2em; margin-bottom: 10px; letter-spacing: 2px; }
        button { 
            padding: 12px 25px; 
            background: #111; 
            color: #0f0; 
            border: 1px solid #0f0; 
            cursor: pointer; 
            font-family: 'Courier New', monospace;
            font-weight: bold;
            text-transform: uppercase;
        }
        button:hover { background: #0f0; color: #000; box-shadow: 0 0 10px #0f0; }
        #loader { 
            position: fixed; 
            top: 0; left: 0; 
            width: 100%; height: 100%; 
            background: #000; 
            z-index: 999; 
            display: flex; 
            flex-direction: column;
            align-items: center; 
            justify-content: center; 
        }
    </style>
</head>
<body>

<div id="loader">
    <h1>BOOTING WILLY CORE...</h1>
    <p>DOWNLOAD IN PROGRESS: PYTHON-CHESS ENGINE</p>
</div>

<div class="wrapper">
    <h2>WILLY V8.7: AI ENGINE</h2>
    <div class="stats">GAMES: <span id="g_count">1</span> | WINS: <span id="w_count">0</span></div>
    <div id="console">INITIALIZING...</div>
    
    <div id="board"></div>
    
    <div style="margin-top: 10px;">
        <button onclick="resetGame()">RESET SYSTEM</button>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
<script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/pyodide/v0.25.0/full/pyodide.js"></script>

<script>
    let pyodide;
    let board;
    let wins = 0;
    let games = 1;

    async function initWilly() {
        // Start the Python-in-browser engine
        pyodide = await loadPyodide();
        await pyodide.loadPackage("micropip");
        const micropip = pyodide.pyimport("micropip");
        await micropip.install("python-chess");

        // The exact Willy V8.6 Python Logic
        await pyodide.runPythonAsync(`
import chess
import random
import math

class WillyEngine:
    def __init__(self):
        self.values = {
            chess.PAWN: 100, chess.KNIGHT: 310, chess.BISHOP: 335,
            chess.ROOK: 500, chess.QUEEN: 950, chess.KING: 20000
        }
        self.book = {
            "": ["e2e4", "d2d4", "c2c4"],
            "e2e4": ["c7c5", "e7e5"],
            "d2d4": ["d7d5", "g8f6"]
        }
    
    def eval(self, b):
        if b.is_checkmate(): return 999999 if b.turn == chess.WHITE else -999999
        s = 0
        for sq, p in b.piece_map().items():
            v = self.values.get(p.piece_type, 0)
            s += v if p.color == chess.BLACK else -v
        return s

    def minimax(self, b, depth, alpha, beta, maximizing):
        if depth == 0 or b.is_game_over(): return self.eval(b)
        if maximizing:
            v = -math.inf
            for m in b.legal_moves:
                b.push(m); v = max(v, self.minimax(b, depth-1, alpha, beta, False)); b.pop()
                alpha = max(alpha, v)
                if beta <= alpha: break
            return v
        else:
            v = math.inf
            for m in b.legal_moves:
                b.push(m); v = min(v, self.minimax(b, depth-1, alpha, beta, True)); b.pop()
                beta = min(beta, v)
                if beta <= alpha: break
            return v

    def select_move(self, fen, history=""):
        b = chess.Board(fen)
        # Check Book
        if history in self.book:
            return random.choice(self.book[history]), "BOOK"
        
        # Search
        best_m = None
        max_v = -math.inf
        for m in b.legal_moves:
            b.push(m); v = self.minimax(b, 3, -math.inf, math.inf, False); b.pop()
            if v > max_v: max_v = v; best_m = m
        
        move_to_play = best_m if best_m else list(b.legal_moves)[0]
        return move_to_play.uci(), "ENGINE"

willy = WillyEngine()
        `);

        $('#loader').fadeOut();
        $('#console').text("WILLY ONLINE: YOUR MOVE");
        setupBoard();
    }

    function setupBoard() {
        var config = {
            draggable: true,
            position: 'start',
            orientation: 'white',
            onDrop: handleMove,
            // FIX: Explicitly load pieces from public URL
            pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png'
        };
        board = Chessboard('board', config);
    }

    async function handleMove(source, target) {
        let moveUCI = source + target;
        
        // Use Python to handle move validation and AI response
        let result = await pyodide.runPythonAsync(`
import chess
board = chess.Board("${board.fen()}")
try:
    user_move = chess.Move.from_uci("${moveUCI}")
    if user_move in board.legal_moves:
        board.push(user_move)
        
        status = "LIVE"
        willy_won = False
        
        if not board.is_game_over():
            # Willy's Turn
            move_history = "" # Simple web history
            wm, w_type = willy.select_move(board.fen(), move_history)
            board.push(chess.Move.from_uci(wm))
            status = "WILLY PLAYED: " + wm
        
        if board.is_game_over():
            status = "GAME OVER"
            if board.result() == "0-1":
                status = "WILLY WINS!"
                willy_won = True
        
        [board.fen(), status, willy_won, board.is_game_over()]
    else:
        None
except:
    None
        `);

        if (!result) return 'snapback';

        // Update UI
        board.position(result[0]);
        $('#console').text(result[1]);
        
        if (result[3]) { // If Game Over
            games++;
            if (result[2]) wins++;
            $('#g_count').text(games);
            $('#w_count').text(wins);
        }
    }

    function resetGame() {
        board.start();
        $('#console').text("SYSTEM RESET - YOUR MOVE");
    }

    // Start everything
    initWilly();
</script>
</body>
</html>
