<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>WILLY V9.2 - PRO CORE</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.css">
    <style>
        :root { --neon: #00ff41; --bg: #050505; }
        body { background: var(--bg); color: var(--neon); font-family: 'Courier New', monospace; text-align: center; padding: 20px; }
        #board { width: 400px; margin: 20px auto; border: 3px solid #333; box-shadow: 0 0 15px rgba(0,255,65,0.2); }
        .panel { background: #111; border: 1px solid #333; padding: 15px; width: 400px; margin: 0 auto; text-align: left; }
        #status { font-weight: bold; color: #fff; margin-bottom: 10px; }
        #history { height: 100px; overflow-y: auto; background: #000; padding: 5px; font-size: 12px; border: 1px solid #222; }
        .loading-screen { position: fixed; top:0; left:0; width:100%; height:100%; background:#000; z-index:100; display:flex; align-items:center; justify-content:center; }
        button { background: #111; color: var(--neon); border: 1px solid var(--neon); padding: 8px; cursor: pointer; margin-top: 10px; }
        button:hover { background: var(--neon); color: #000; }
    </style>
</head>
<body>

<div id="loading-screen" class="loading-screen"><h1>WAKING UP WILLY...</h1></div>

<h2>WILLY V9.2: PRO ENGINE</h2>

<div id="board"></div>

<div class="panel">
    <div id="status">STATUS: INITIALIZING...</div>
    <strong>HISTORY:</strong>
    <div id="history"></div>
    <button onclick="location.reload()">RELOAD ENGINE</button>
</div>

<script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/pyodide/v0.25.0/full/pyodide.js"></script>

<script>
    let pyodide;
    let board;
    let game_state = "LIVE";
    let isThinking = false;

    async function init() {
        pyodide = await loadPyodide();
        await pyodide.loadPackage("micropip");
        const micropip = pyodide.pyimport("micropip");
        await micropip.install("python-chess");

        // The Full-Strength Python Brain
        await pyodide.runPythonAsync(`
import chess
import math

class WillyBrain:
    def __init__(self):
        self.values = {1:100, 2:320, 3:330, 4:500, 5:900, 6:20000}

    def eval(self, b):
        if b.is_checkmate(): return 999999 if b.turn == chess.BLACK else -999999
        if b.is_game_over(): return 0
        s = 0
        for sq, p in b.piece_map().items():
            v = self.values.get(p.piece_type, 0)
            s += v if p.color == chess.BLACK else -v
        return s

    def minimax(self, b, depth, a, beta, maximizing):
        if depth == 0 or b.is_game_over(): return self.eval(b)
        if maximizing:
            v = -math.inf
            for m in b.legal_moves:
                b.push(m); v = max(v, self.minimax(b, depth-1, a, beta, False)); b.pop()
                a = max(a, v)
                if beta <= a: break
            return v
        else:
            v = math.inf
            for m in b.legal_moves:
                b.push(m); v = min(v, self.minimax(b, depth-1, a, beta, True)); b.pop()
                beta = min(beta, v)
                if beta <= a: break
            return v

    def get_move(self, fen):
        b = chess.Board(fen)
        best_m = None
        max_v = -math.inf
        for m in b.legal_moves:
            b.push(m)
            # Depth 3 for Colab-level play
            v = self.minimax(b, 2, -math.inf, math.inf, False)
            b.pop()
            if v > max_v:
                max_v = v
                best_m = m
        return best_m.uci() if best_m else None

bot = WillyBrain()
        `);

        $('#loading-screen').hide();
        $('#status').text("STATUS: YOUR TURN");
        
        board = Chessboard('board', {
            draggable: true,
            position: 'start',
            pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png',
            onDrop: handleMove
        });
    }

    async function handleMove(source, target) {
        if (isThinking || game_state === "OVER") return 'snapback';

        let moveUCI = source + target;
        isThinking = true;
        $('#status').text("STATUS: WILLY IS CALCULATING...");

        let result = await pyodide.runPythonAsync(`
import chess
b = chess.Board("${board.fen()}")
try:
    m = chess.Move.from_uci("${moveUCI}")
    if m in b.legal_moves:
        b.push(m)
        move_log = "You: " + "${moveUCI}"
        
        if not b.is_game_over():
            wm = bot.get_move(b.fen())
            if wm:
                b.push(chess.Move.from_uci(wm))
                move_log += " | Willy: " + wm
        
        [b.fen(), move_log, b.is_game_over()]
    else:
        None
except:
    None
        `);

        if (!result) {
            $('#status').text("STATUS: INVALID MOVE");
            isThinking = false;
            return 'snapback';
        }

        board.position(result[0]);
        $('#history').append("<div>" + result[1] + "</div>");
        $("#history").scrollTop($("#history")[0].scrollHeight);
        
        if (result[2]) {
            game_state = "OVER";
            $('#status').text("STATUS: GAME OVER");
        } else {
            $('#status').text("STATUS: YOUR TURN");
        }
        
        isThinking = false;
    }

    init();
</script>
</body>
</html>
