<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>WILLY V9.0 - DEBUG CORE</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.css">
    <style>
        body { background: #000; color: #0f0; font-family: monospace; text-align: center; }
        #board { width: 350px; margin: 20px auto; border: 2px solid #333; }
        #debug-log { 
            background: #111; color: #0f0; border: 1px solid #333; 
            width: 90%; max-width: 500px; margin: 10px auto; 
            height: 100px; overflow-y: scroll; font-size: 10px; text-align: left; padding: 5px;
        }
        .stats { font-size: 1.2em; color: #fff; }
        button { padding: 10px; background: #222; color: #0f0; border: 1px solid #0f0; cursor: pointer; }
    </style>
</head>
<body>

    <h2>WILLY V9.0: DEBUG MODE</h2>
    <div class="stats">GAMES: <span id="g_count">1</span> | WINS: <span id="w_count">0</span></div>
    
    <div id="board"></div>
    
    <div id="debug-log"> [SYSTEM] Initializing...<br></div>
    
    <button onclick="location.reload()">FORCE RESTART ENGINE</button>

    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/pyodide/v0.25.0/full/pyodide.js"></script>

    <script>
        let pyodide;
        let board;

        function log(msg) {
            $('#debug-log').append(" > " + msg + "<br>");
            $("#debug-log").scrollTop($("#debug-log")[0].scrollHeight);
        }

        async function initWilly() {
            try {
                log("Downloading Pyodide...");
                pyodide = await loadPyodide();
                log("Loading Micropip...");
                await pyodide.loadPackage("micropip");
                const micropip = pyodide.pyimport("micropip");
                log("Installing python-chess (This takes 10s)...");
                await micropip.install("python-chess");
                
                log("Injecting Willy's Brain...");
                await pyodide.runPythonAsync(`
import chess
import random
import math

class WillyV9:
    def __init__(self):
        self.values = {1:100, 2:310, 3:335, 4:500, 5:950, 6:20000}
    
    def get_move(self, fen):
        board = chess.Board(fen)
        # Fast Minimax (Depth 2 for Web speed)
        best_val = -math.inf
        best_move = None
        for move in board.legal_moves:
            board.push(move)
            val = self.eval(board)
            board.pop()
            if val > best_val:
                best_val = val
                best_move = move
        return best_move.uci() if best_move else list(board.legal_moves)[0].uci()

    def eval(self, b):
        s = 0
        for sq, p in b.piece_map().items():
            v = self.values.get(p.piece_type, 0)
            s += v if p.color == chess.BLACK else -v
        return s

willy = WillyV9()
                `);
                
                log("System Ready! Drawing Board...");
                setupBoard();
            } catch (err) {
                log("CRITICAL ERROR: " + err.message);
            }
        }

        function setupBoard() {
            board = Chessboard('board', {
                draggable: true,
                position: 'start',
                pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png',
                onDrop: handleMove
            });
            log("Board Active. Make your move.");
        }

        async function handleMove(source, target) {
            let move = source + target;
            log("User Move Attempt: " + move);
            
            try {
                let result = await pyodide.runPythonAsync(`
import chess
b = chess.Board("${board.fen()}")
m = chess.Move.from_uci("${move}")
if m in b.legal_moves:
    b.push(m)
    if not b.is_game_over():
        wm = willy.get_move(b.fen())
        b.push(chess.Move.from_uci(wm))
        res = [b.fen(), "Willy moved: " + wm]
    else:
        res = [b.fen(), "Game Over"]
else:
    res = None
res
                `);

                if (result === null) {
                    log("Invalid move.");
                    return 'snapback';
                }

                board.position(result[0]);
                log(result[1]);
            } catch (e) {
                log("Move Error: " + e.message);
            }
        }

        initWilly();
    </script>
</body>
</html>
