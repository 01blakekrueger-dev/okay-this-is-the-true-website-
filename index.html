<!DOCTYPE html>
<html>
<head>
    <title>WILLY V8.8 - CORE</title>
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <style>
        body { background: #000; color: #0f0; font-family: monospace; text-align: center; padding: 20px; }
        #board { width: 400px; margin: 20px auto; border: 2px solid #333; }
        #status { background: #111; padding: 10px; border: 1px solid #0f0; margin-bottom: 10px; min-height: 20px; }
        .stats { margin-bottom: 10px; font-size: 1.2em; }
        #loading { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: flex; align-items: center; justify-content: center; z-index: 10; }
    </style>
</head>
<body>

<div id="loading"><h1>WAKING UP WILLY... (Wait 10s)</h1></div>

<h2>WILLY V8.8: ENGINE LIVE</h2>
<div class="stats">GAMES: <span id="g_count">1</span> | WINS: <span id="w_count">0</span></div>
<div id="status">Willy is thinking...</div>
<div id="board"></div>
<button onclick="location.reload()" style="padding:10px; cursor:pointer;">HARD RESET</button>

<script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
<script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/pyodide/v0.25.0/full/pyodide.js"></script>

<script>
    let pyodide;
    let board;
    let wins = 0;
    let games = 1;

    async function start() {
        // 1. Load Pyodide
        pyodide = await loadPyodide();
        await pyodide.loadPackage("micropip");
        const micropip = pyodide.pyimport("micropip");
        await micropip.install("python-chess");

        // 2. Inject Willy
        await pyodide.runPythonAsync(`
import chess
import random
import math

class Willy:
    def eval(self, b):
        if b.is_checkmate(): return 999999 if b.turn == chess.WHITE else -999999
        values = {1:100, 2:310, 3:335, 4:500, 5:950, 6:20000}
        s = 0
        for sq, p in b.piece_map().items():
            v = values.get(p.piece_type, 0)
            s += v if p.color == chess.BLACK else -v
        return s

    def minimax(self, b, depth, a, beta, maximizing):
        if depth == 0 or b.is_game_over(): return self.eval(b)
        if maximizing:
            v = -math.inf
            for m in b.legal_moves:
                b.push(m); v = max(v, self.minimax(b, depth-1, a, beta, False)); b.pop()
                a = max(a, v)
                if beta <= a: break
            return v
        else:
            v = math.inf
            for m in b.legal_moves:
                b.push(m); v = min(v, self.minimax(b, depth-1, a, beta, True)); b.pop()
                beta = min(beta, v)
                if beta <= a: break
            return v

bot = Willy()
        `);

        $('#loading').hide();
        $('#status').text("YOUR MOVE (WHITE)");
        
        board = Chessboard('board', {
            draggable: true,
            position: 'start',
            pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png',
            onDrop: onDrop
        });
    }

    async function onDrop(source, target) {
        let move = source + target;
        let fen = board.fen();

        let result = await pyodide.runPythonAsync(`
import chess
b = chess.Board("${fen}")
try:
    m = chess.Move.from_uci("${move}")
    if m in b.legal_moves:
        b.push(m)
        if not b.is_game_over():
            # WILLY MOVES
            best_m = None
            max_v = -math.inf
            for move_option in b.legal_moves:
                b.push(move_option)
                val = bot.minimax(b, 2, -math.inf, math.inf, False)
                b.pop()
                if val > max_v:
                    max_v = val
                    best_m = move_option
            b.push(best_m)
        
        # [NEW FEN, STATUS, DID WILLY WIN, IS OVER]
        [b.fen(), "WILLY MOVED", b.is_checkmate() and b.result()=="0-1", b.is_game_over()]
    else:
        None
except:
    None
        `);

        if (!result) return 'snapback';

        board.position(result[0]);
        $('#status').text(result[1]);

        if (result[3]) {
            games++;
            if (result[2]) { wins++; $('#status').text("WILLY WINS!"); }
            else { $('#status').text("GAME OVER / DRAW"); }
            $('#g_count').text(games); $('#w_count').text(wins);
        }
    }

    start();
</script>
</body>
</html>
